name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_NAME: ecommerce-backend
  APP_DIR: ecommerce-backend

jobs:
  deploy:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "package.json,package-lock.json,src,database"
          target: /home/${{ secrets.EC2_USERNAME }}/${{ env.APP_DIR }}
          overwrite: true

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR="$HOME/${{ env.APP_NAME }}"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "Installing production dependencies..."
            npm ci --omit=dev

            echo "Ensuring PM2 is installed..."
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            echo "Starting or restarting application..."
            if pm2 describe "${{ env.APP_NAME }}" >/dev/null 2>&1; then
              pm2 restart "${{ env.APP_NAME }}" --update-env
            else
              pm2 start src/server.js --name "${{ env.APP_NAME }}"
            fi

            pm2 save

            echo "Deployment completed successfully."
