name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_NAME: ecommerce-backend

jobs:
  deploy:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: tar -czf deploy.tar.gz package.json package-lock.json src database

      - name: Prepare app directory on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            mkdir -p "$HOME/${{ env.APP_NAME }}"

      - name: Upload deployment package
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: deploy.tar.gz
          target: /home/${{ secrets.EC2_USERNAME }}/

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="$HOME/${{ env.APP_NAME }}"
            cd "$APP_DIR"

            echo "Extracting deployment package..."
            tar -xzf "$HOME/deploy.tar.gz" -C "$APP_DIR"
            rm -f "$HOME/deploy.tar.gz"

            echo "Node: $(node -v)"
            echo "NPM: $(npm -v)"
            ls -la "$APP_DIR"

            if [ ! -f "$APP_DIR/package.json" ]; then
              echo "ERROR: package.json not found after extract"
              exit 1
            fi

            echo "Installing production dependencies..."
            npm ci --omit=dev

            echo "Ensuring PM2 is installed..."
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "Starting or restarting application..."
            if pm2 describe "${{ env.APP_NAME }}" >/dev/null 2>&1; then
              pm2 restart "${{ env.APP_NAME }}" --update-env
            else
              pm2 start src/server.js --name "${{ env.APP_NAME }}"
            fi

            pm2 save || true

            echo "Deployment completed successfully."
            pm2 status
