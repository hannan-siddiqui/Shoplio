name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  APP_DIR: /var/www/express-app
  APP_NAME: express-app

jobs:
  deploy:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: tar -czf deploy.tar.gz package.json package-lock.json src database

      - name: Prepare app directory on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p ${{ env.APP_DIR }}
            sudo chown -R $USER:$USER ${{ env.APP_DIR }}

      - name: Upload deployment package
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: deploy.tar.gz
          target: /tmp/

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            cd "$APP_DIR"

            echo "Extracting deployment package..."
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/deploy.tar.gz

            echo "Node: $(node -v)"
            echo "NPM: $(npm -v)"
            ls -la "$APP_DIR"

            if [ ! -f "$APP_DIR/package.json" ]; then
              echo "ERROR: package.json not found after extract"
              exit 1
            fi

            if [ ! -f "$APP_DIR/.env" ]; then
              echo "ERROR: .env not found at $APP_DIR/.env"
              echo "Create it manually on EC2 before deploying."
              exit 1
            fi

            echo ".env found — existing server config will be kept"

            echo "Installing production dependencies..."
            npm ci --omit=dev

            echo "Ensuring PM2 is installed..."
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "Starting or restarting application..."
            cd "$APP_DIR"

            if pm2 describe "${{ env.APP_NAME }}" >/dev/null 2>&1; then
              pm2 restart "${{ env.APP_NAME }}" --update-env
            else
              pm2 start src/server.js --name "${{ env.APP_NAME }}" --cwd "$APP_DIR"
            fi

            pm2 save || true

            echo "Deployment completed successfully."
            pm2 status

            echo "Health check..."
            sleep 3
            curl -sf "http://localhost:8000/api/health" && echo "" || echo "WARNING: health check failed — check pm2 logs"
